<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Chinesinha777 Admin</title>
  <style>
    :root { font-family: system-ui, sans-serif; color: #e8e8e8; background: #0b0f14; }
    body { max-width: 420px; margin: 8vh auto; padding: 24px; }
    h1 { font-size: 1.25rem; margin: 0 0 8px; }
    .sub { color: #8b9bb4; font-size: .9rem; margin-bottom: 24px; }
    label { display:block; font-size:.8rem; margin:12px 0 4px; color:#aab; }
    input { width:100%; padding:10px 12px; border-radius:8px; border:1px solid #243044; background:#121821; color:#fff; box-sizing:border-box; }
    button { margin-top:16px; width:100%; padding:12px; border:0; border-radius:8px; background:linear-gradient(90deg,#f5b942,#e08a1e); color:#111; font-weight:700; cursor:pointer; }
    .card { background:#121821; border:1px solid #243044; border-radius:12px; padding:20px; }
    .msg { margin-top:12px; font-size:.85rem; min-height:1.2em; }
    .ok { color:#6dffa8; }
    .err { color:#ff7b7b; }
    pre { background:#0b0f14; padding:12px; border-radius:8px; overflow:auto; font-size:.75rem; max-height:50vh; }
    a { color:#f5b942; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Chinesinha777 Admin</h1>
    <p class="sub">Supabase Edge · produção</p>
    <div id="loginBox">
      <label>E-mail</label>
      <input id="email" type="email" value="admin@test.local" autocomplete="username"/>
      <label>Senha</label>
      <input id="pass" type="password" value="102030" autocomplete="current-password"/>
      <button id="btn" type="button">Entrar</button>
      <div class="msg" id="msg"></div>
    </div>
    <div id="dash" style="display:none">
      <p class="ok">Logado: <span id="who"></span></p>
      <pre id="sum"></pre>
      <button id="out" type="button">Sair</button>
    </div>
  </div>
  <p class="sub" style="margin-top:16px">
    Site: <a href="https://chinesinha777.bet">chinesinha777.bet</a>
  </p>
<script>
const API = "https://bgajbbvgcqqkbvbtwnec.supabase.co/functions/v1/admin-api";
const ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJnYWpiYnZnY3Fxa2J2YnR3bmVjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM3NzcyODUsImV4cCI6MjA5OTM1MzI4NX0.AwabvvbOtljHtrvk_KJGKQVuvZLJRphrtcrSQnojGr0";
const msg = (t, ok) => { const el=document.getElementById('msg'); el.textContent=t; el.className='msg '+(ok?'ok':'err'); };
const headers = () => ({
  'Content-Type': 'application/json',
  'apikey': ANON,
  'Authorization': 'Bearer ' + (localStorage.getItem('ch7_admin_token') || ANON),
});
async function loadSummary() {
  const r = await fetch(API + '/summary', { headers: headers() });
  const j = await r.json();
  document.getElementById('sum').textContent = JSON.stringify(j, null, 2);
}
document.getElementById('btn').onclick = async () => {
  msg('Entrando...', true);
  const r = await fetch(API + '/auth/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', apikey: ANON, Authorization: 'Bearer ' + ANON },
    body: JSON.stringify({ email: email.value.trim(), password: pass.value }),
  });
  const j = await r.json();
  if (!j.ok) { msg(j.error || 'Falha', false); return; }
  localStorage.setItem('ch7_admin_token', j.token);
  document.getElementById('loginBox').style.display = 'none';
  document.getElementById('dash').style.display = 'block';
  document.getElementById('who').textContent = j.user.email + ' · ' + j.user.role;
  msg('OK', true);
  await loadSummary();
};
document.getElementById('out').onclick = () => {
  localStorage.removeItem('ch7_admin_token');
  location.reload();
};
if (localStorage.getItem('ch7_admin_token')) {
  document.getElementById('loginBox').style.display = 'none';
  document.getElementById('dash').style.display = 'block';
  fetch(API + '/auth/me', { headers: headers() }).then(r=>r.json()).then(j=>{
    if (j.ok) {
      document.getElementById('who').textContent = j.user.email + ' · ' + j.user.role;
      loadSummary();
    } else {
      localStorage.removeItem('ch7_admin_token');
      location.reload();
    }
  });
}
</script>
</body>
</html>
