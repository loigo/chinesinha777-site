<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<meta name="robots" content="noindex,nofollow"/>
<title>Redefinir senha — Chinesinha777</title>
<link rel="icon" href="/static/brand/logo-icon-32.png"/>
<style>
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px;
    font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;color:#fff;
    background:radial-gradient(ellipse at 50% 20%,#2a1a08 0%,#0b0a09 60%)}
  .card{width:100%;max-width:420px;background:linear-gradient(180deg,#242018,#16120c);
    border:1px solid rgba(246,207,135,.32);border-radius:18px;padding:26px 22px 22px;
    box-shadow:0 16px 48px rgba(0,0,0,.45)}
  .logo{display:block;margin:0 auto 14px;height:42px;width:auto;object-fit:contain}
  h1{margin:0 0 8px;text-align:center;font:800 1.25rem/1.3 system-ui,sans-serif;color:#f6cf87}
  .sub{margin:0 0 18px;text-align:center;font-size:13px;color:#aeb7bb;line-height:1.5}
  .badge{display:none;text-align:center;margin:0 0 14px}
  .badge.show{display:block}
  .badge span{display:inline-block;padding:6px 12px;border-radius:999px;font:700 12px/1.2 system-ui,sans-serif;
    background:rgba(246,207,135,.1);border:1px solid rgba(246,207,135,.28);color:#f6cf87}
  .badge.bad span{background:rgba(248,113,113,.1);border-color:rgba(248,113,113,.3);color:#fca5a5}
  label{display:block;font-size:12px;color:#aeb7bb;margin:0 0 6px;font-weight:600}
  .field{margin:0 0 12px;position:relative}
  input{width:100%;padding:13px 14px;border-radius:12px;border:1px solid rgba(255,255,255,.1);
    background:rgba(255,255,255,.06);color:#fff;font:400 15px/1.2 system-ui,sans-serif;outline:0}
  input:focus{border-color:rgba(246,207,135,.5);box-shadow:0 0 0 2px rgba(246,207,135,.12)}
  .meter{height:4px;border-radius:4px;background:rgba(255,255,255,.08);margin:8px 0 0;overflow:hidden}
  .meter > i{display:block;height:100%;width:0;border-radius:4px;transition:width .2s,background .2s}
  .hint{font-size:11px;color:#8a8680;margin:6px 0 0}
  .err{display:none;color:#ff9b9b;font-size:13px;margin:0 0 12px;line-height:1.45;
    padding:10px 12px;border-radius:10px;background:rgba(255,120,120,.1);border:1px solid rgba(255,120,120,.25)}
  .err.show{display:block}
  .ok{display:none;text-align:center}
  .ok.show{display:block}
  .ok .check{width:64px;height:64px;margin:0 auto 12px;border-radius:50%;
    background:linear-gradient(145deg,#86efac,#16a34a);display:flex;align-items:center;justify-content:center;
    box-shadow:0 8px 24px rgba(34,197,94,.35)}
  .ok h2{margin:0 0 8px;color:#7bfe7c;font-size:1.15rem}
  button{width:100%;margin-top:6px;padding:14px;border:0;border-radius:12px;cursor:pointer;
    font:800 15px/1.2 system-ui,sans-serif;color:#1a1208;
    background:linear-gradient(180deg,#ffe566,#f0b429 55%,#d4920a);box-shadow:0 6px 18px rgba(240,180,41,.25)}
  button:disabled{opacity:.55;cursor:not-allowed;box-shadow:none}
  button.secondary{background:#323749;color:#fff;font-weight:700;margin-top:10px;box-shadow:none}
  .form.hidden,.loading-block.hidden{display:none}
  .loading-block{text-align:center;padding:18px 8px;color:#aeb7bb;font-size:14px}
  .spin{display:inline-block;width:22px;height:22px;border:2px solid rgba(246,207,135,.25);
    border-top-color:#f6cf87;border-radius:50%;animation:sp .7s linear infinite;margin-bottom:10px}
  @keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>
<body>
  <div class="card">
    <img class="logo" src="/static/brand/logo-horizontal.png" alt="Chinesinha777" width="200" height="48"/>
    <h1>Redefinir senha</h1>
    <p class="sub" id="subtitle">Crie uma nova senha para acessar sua conta. O link expira em 15 minutos.</p>

    <div id="badge" class="badge" aria-live="polite"><span id="badgeText"></span></div>
    <div id="err" class="err" role="alert"></div>

    <div id="loading" class="loading-block">
      <div class="spin" aria-hidden="true"></div>
      <div>Validando link…</div>
    </div>

    <div id="ok" class="ok">
      <div class="check" aria-hidden="true">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#052e16" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>
      </div>
      <h2>Senha alterada!</h2>
      <p class="sub" style="margin-bottom:14px">Faça login com a nova senha.</p>
      <button type="button" id="btnLogin">Ir para o login</button>
    </div>

    <form id="form" class="form hidden" autocomplete="off" novalidate>
      <div class="field">
        <label for="pass">Nova senha</label>
        <input id="pass" type="password" minlength="6" required placeholder="Mínimo 6 caracteres" autocomplete="new-password"/>
        <div class="meter" aria-hidden="true"><i id="meterBar"></i></div>
        <p class="hint" id="meterHint">Use letras e números para uma senha mais segura.</p>
      </div>
      <div class="field">
        <label for="pass2">Confirmar senha</label>
        <input id="pass2" type="password" minlength="6" required placeholder="Repita a senha" autocomplete="new-password"/>
      </div>
      <button type="submit" id="btn">Salvar nova senha</button>
      <button type="button" class="secondary" id="btnCancel">Cancelar</button>
    </form>
  </div>
<script>
(function(){
  var EDGE = 'https://bgajbbvgcqqkbvbtwnec.supabase.co/functions/v1/auth-api';
  var ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJnYWpiYnZnY3Fxa2J2YnR3bmVjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM3NzcyODUsImV4cCI6MjA5OTM1MzI4NX0.AwabvvbOtljHtrvk_KJGKQVuvZLJRphrtcrSQnojGr0';
  var params = new URLSearchParams(location.search);
  var token = params.get('token') || params.get('t') || '';
  var form = document.getElementById('form');
  var err = document.getElementById('err');
  var ok = document.getElementById('ok');
  var btn = document.getElementById('btn');
  var loading = document.getElementById('loading');
  var badge = document.getElementById('badge');
  var badgeText = document.getElementById('badgeText');
  var isLocal = /^(localhost|127\.0\.0\.1|\[::1\])$/i.test(location.hostname||'');

  function showErr(m){
    err.textContent = m || '';
    err.classList.toggle('show', !!m);
  }
  function showBadge(text, bad){
    badgeText.textContent = text || '';
    badge.classList.toggle('show', !!text);
    badge.classList.toggle('bad', !!bad);
  }
  function apiUrl(path){
    if (isLocal) return location.origin + '/api/auth' + path;
    return EDGE + path;
  }
  function headers(){
    var h = { 'Content-Type': 'application/json', Accept: 'application/json' };
    if (!isLocal) {
      h.apikey = ANON;
      h.Authorization = 'Bearer ' + ANON;
    }
    return h;
  }

  function strength(p){
    var s = 0;
    if (p.length >= 6) s++;
    if (p.length >= 10) s++;
    if (/[A-Z]/.test(p) && /[a-z]/.test(p)) s++;
    if (/\d/.test(p)) s++;
    if (/[^A-Za-z0-9]/.test(p)) s++;
    return Math.min(4, s);
  }
  document.getElementById('pass').addEventListener('input', function(){
    var p = this.value || '';
    var n = strength(p);
    var bar = document.getElementById('meterBar');
    var hint = document.getElementById('meterHint');
    var pct = [0, 25, 50, 75, 100][n];
    var colors = ['#ef4444','#f97316','#eab308','#84cc16','#22c55e'];
    var labels = ['Muito fraca','Fraca','Razoável','Boa','Forte'];
    bar.style.width = pct + '%';
    bar.style.background = colors[n] || colors[0];
    hint.textContent = p ? ('Força: ' + labels[n]) : 'Use letras e números para uma senha mais segura.';
  });

  async function validateToken(){
    if (!token) {
      loading.classList.add('hidden');
      form.classList.add('hidden');
      showBadge('Link inválido', true);
      showErr('Link inválido ou incompleto. Solicite uma nova recuperação de senha no login.');
      return false;
    }
    try {
      var res = await fetch(apiUrl('/validate-reset?token=' + encodeURIComponent(token)), {
        headers: headers()
      });
      var j = await res.json().catch(function(){ return {}; });
      loading.classList.add('hidden');
      if (j.valid || j.ok) {
        form.classList.remove('hidden');
        var min = j.expiresInMin != null ? j.expiresInMin : 15;
        showBadge('Link válido · expira em ~' + min + ' min', false);
        return true;
      }
      form.classList.add('hidden');
      showBadge('Link inválido ou expirado', true);
      showErr(j.error || 'Link inválido ou expirado. Solicite uma nova recuperação.');
      return false;
    } catch (e) {
      // se validate não existir (prod edge antigo), ainda mostra o form
      loading.classList.add('hidden');
      form.classList.remove('hidden');
      showBadge('Defina sua nova senha', false);
      return true;
    }
  }

  form.onsubmit = async function(e){
    e.preventDefault();
    showErr('');
    var p1 = document.getElementById('pass').value;
    var p2 = document.getElementById('pass2').value;
    if (p1.length < 6) return showErr('A senha deve ter no mínimo 6 caracteres.');
    if (p1 !== p2) return showErr('As senhas não coincidem.');
    btn.disabled = true;
    btn.textContent = 'Salvando…';
    try {
      var res = await fetch(apiUrl('/reset-password'), {
        method: 'POST',
        headers: headers(),
        body: JSON.stringify({ token: token, password: p1, passwordConfirm: p2 })
      });
      var j = await res.json().catch(function(){ return {}; });
      if (j.ok) {
        form.classList.add('hidden');
        badge.classList.remove('show');
        ok.classList.add('show');
        document.getElementById('subtitle').textContent = 'Tudo certo! Use a nova senha no próximo login.';
      } else {
        showErr(j.error || j.msg || 'Não foi possível redefinir a senha.');
      }
    } catch (x) {
      showErr('Erro de conexão. Tente novamente.');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Salvar nova senha';
    }
  };

  document.getElementById('btnLogin').onclick = function(){
    location.href = '/#/';
  };
  document.getElementById('btnCancel').onclick = function(){
    location.href = '/#/';
  };

  validateToken();
})();
</script>
</body>
</html>
