<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>Nova senha — Chinesinha777</title>
<link rel="icon" href="/static/brand/logo-icon-32.png"/>
<style>
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px;
    font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;color:#fff;
    background:radial-gradient(ellipse at 50% 20%,#2a1a08 0%,#0b0a09 60%)}
  .card{width:100%;max-width:400px;background:linear-gradient(180deg,#242018,#16120c);
    border:1px solid rgba(246,207,135,.32);border-radius:18px;padding:24px 20px;
    box-shadow:0 16px 48px rgba(0,0,0,.45)}
  .logo{display:block;margin:0 auto 14px;height:40px;width:auto;object-fit:contain}
  h1{margin:0 0 8px;text-align:center;font:800 1.2rem/1.3 system-ui,sans-serif;color:#f6cf87}
  .sub{margin:0 0 18px;text-align:center;font-size:13px;color:#aeb7bb;line-height:1.45}
  label{display:block;font-size:12px;color:#aeb7bb;margin:0 0 6px;font-weight:600}
  .field{margin:0 0 12px}
  input{width:100%;padding:13px 14px;border-radius:12px;border:1px solid rgba(255,255,255,.1);
    background:rgba(255,255,255,.06);color:#fff;font:400 15px/1.2 system-ui,sans-serif;outline:0}
  input:focus{border-color:rgba(246,207,135,.5);box-shadow:0 0 0 2px rgba(246,207,135,.12)}
  .err{display:none;color:#ff9b9b;font-size:13px;margin:0 0 12px;line-height:1.4;
    padding:8px 10px;border-radius:10px;background:rgba(255,120,120,.1);border:1px solid rgba(255,120,120,.25)}
  .err.show{display:block}
  .ok{display:none;text-align:center}
  .ok.show{display:block}
  .ok h2{margin:0 0 8px;color:#7bfe7c;font-size:1.1rem}
  button{width:100%;margin-top:6px;padding:14px;border:0;border-radius:12px;cursor:pointer;
    font:800 15px/1.2 system-ui,sans-serif;color:#1a1208;
    background:linear-gradient(180deg,#ffe566,#f0b429 55%,#d4920a)}
  button:disabled{opacity:.6;cursor:wait}
  button.secondary{background:#323749;color:#fff;font-weight:700;margin-top:10px}
  .form.hidden{display:none}
</style>
</head>
<body>
  <div class="card">
    <img class="logo" src="/static/brand/logo-horizontal.png" alt="Chinesinha777"/>
    <h1>Nova senha</h1>
    <p class="sub">Defina uma senha forte para sua conta. O link de recuperação expira em 15 minutos.</p>
    <div id="err" class="err" role="alert"></div>
    <div id="ok" class="ok">
      <h2>Senha alterada!</h2>
      <p class="sub" style="margin-bottom:14px">Faça login com a nova senha.</p>
      <button type="button" id="btnLogin">Ir para o site / Login</button>
    </div>
    <form id="form" class="form" autocomplete="off">
      <div class="field">
        <label for="pass">Nova senha</label>
        <input id="pass" type="password" minlength="6" required placeholder="Mínimo 6 caracteres" autocomplete="new-password"/>
      </div>
      <div class="field">
        <label for="pass2">Confirmar senha</label>
        <input id="pass2" type="password" minlength="6" required placeholder="Repita a senha" autocomplete="new-password"/>
      </div>
      <button type="submit" id="btn">Resetar senha</button>
      <button type="button" class="secondary" id="btnCancel">Cancelar</button>
    </form>
  </div>
<script>
(function(){
  var EDGE = 'https://bgajbbvgcqqkbvbtwnec.supabase.co/functions/v1/auth-api';
  var ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJnYWpiYnZnY3Fxa2J2YnR3bmVjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM3NzcyODUsImV4cCI6MjA5OTM1MzI4NX0.AwabvvbOtljHtrvk_KJGKQVuvZLJRphrtcrSQnojGr0';
  var token = new URLSearchParams(location.search).get('token') || '';
  var form = document.getElementById('form');
  var err = document.getElementById('err');
  var ok = document.getElementById('ok');
  var btn = document.getElementById('btn');
  var isLocal = /^(localhost|127\.0\.0\.1|\[::1\])$/i.test(location.hostname||'');

  function showErr(m){
    err.textContent = m || '';
    err.classList.toggle('show', !!m);
  }

  function apiUrl(path){
    if (isLocal) return location.origin + '/api/auth' + path;
    return EDGE + path;
  }

  function headers(){
    var h = { 'Content-Type': 'application/json', Accept: 'application/json' };
    if (!isLocal) {
      h.apikey = ANON;
      h.Authorization = 'Bearer ' + ANON;
    }
    return h;
  }

  if (!token) {
    form.classList.add('hidden');
    showErr('Link inválido. Solicite uma nova recuperação de senha no login.');
  }

  form.onsubmit = async function(e){
    e.preventDefault();
    showErr('');
    var p1 = document.getElementById('pass').value;
    var p2 = document.getElementById('pass2').value;
    if (p1.length < 6) return showErr('A senha deve ter no mínimo 6 caracteres.');
    if (p1 !== p2) return showErr('As senhas não coincidem.');
    btn.disabled = true;
    btn.textContent = 'Salvando…';
    try {
      var res = await fetch(apiUrl('/reset-password'), {
        method: 'POST',
        headers: headers(),
        body: JSON.stringify({ token: token, password: p1, passwordConfirm: p2 })
      });
      var j = await res.json().catch(function(){ return {}; });
      if (j.ok) {
        form.classList.add('hidden');
        ok.classList.add('show');
      } else {
        showErr(j.error || j.msg || 'Não foi possível redefinir a senha.');
      }
    } catch (x) {
      showErr('Erro de conexão. Tente novamente.');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Resetar senha';
    }
  };

  document.getElementById('btnLogin').onclick = function(){
    location.href = '/#/';
  };
  document.getElementById('btnCancel').onclick = function(){
    location.href = '/#/';
  };
})();
</script>
</body>
</html>
