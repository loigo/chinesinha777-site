<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2a100c"/>
      <stop offset="100%" stop-color="#0a0908"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFF8DC"/>
      <stop offset="40%" stop-color="#FFD54A"/>
      <stop offset="100%" stop-color="#B8730F"/>
    </linearGradient>
    <linearGradient id="red" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF6B6B"/>
      <stop offset="100%" stop-color="#8B0000"/>
    </linearGradient>
    <filter id="g" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6" result="b"/>
      <feFlood flood-color="#F6CF87" flood-opacity="0.5" result="c"/>
      <feComposite in="c" in2="b" operator="in" result="gl"/>
      <feMerge><feMergeNode in="gl"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <rect x="18" y="18" width="476" height="476" rx="82" fill="none" stroke="url(#gold)" stroke-width="8" opacity="0.9"/>
  <text x="256" y="310" text-anchor="middle"
    font-family="Arial Black, Impact, Segoe UI Black, sans-serif"
    font-size="200" font-weight="900" letter-spacing="-6"
    fill="url(#red)" filter="url(#g)">777</text>
</svg>