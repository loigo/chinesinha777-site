<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 260" fill="none">
  <defs>
    <linearGradient id="skin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5c9a0"/>
      <stop offset="100%" stop-color="#d4925c"/>
    </linearGradient>
    <linearGradient id="shirt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff6b4a"/>
      <stop offset="100%" stop-color="#c42818"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffe566"/>
      <stop offset="50%" stop-color="#f0b429"/>
      <stop offset="100%" stop-color="#c67c0a"/>
    </linearGradient>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000" flood-opacity=".35"/>
    </filter>
  </defs>
  <!-- body -->
  <ellipse cx="100" cy="248" rx="52" ry="10" fill="#000" opacity=".25"/>
  <path d="M55 150c0-10 20-18 45-18s45 8 45 18v70H55V150z" fill="url(#shirt)" filter="url(#sh)"/>
  <path d="M55 150c8 12 28 18 45 18s37-6 45-18" fill="#a31a10"/>
  <!-- arms -->
  <path d="M55 165c-18 8-28 28-22 48l18 6c-2-14 4-28 14-36z" fill="url(#skin)"/>
  <path d="M145 165c18 8 28 28 22 48l-18 6c2-14-4-28-14-36z" fill="url(#skin)"/>
  <!-- head -->
  <circle cx="100" cy="88" r="48" fill="url(#skin)" filter="url(#sh)"/>
  <!-- hair -->
  <path d="M55 85c2-40 30-58 45-58 18 0 42 14 48 50-10-18-28-28-48-26-16 1-32 12-45 34z" fill="#1a120e"/>
  <path d="M58 78c-6 10-8 22-6 32 4-8 10-14 18-18z" fill="#1a120e"/>
  <!-- face -->
  <ellipse cx="82" cy="92" rx="5" ry="6" fill="#2a1810"/>
  <ellipse cx="118" cy="92" rx="5" ry="6" fill="#2a1810"/>
  <path d="M92 112c6 8 18 8 24 0" stroke="#a85a3a" stroke-width="3" stroke-linecap="round"/>
  <ellipse cx="78" cy="102" rx="8" ry="4" fill="#f0a080" opacity=".45"/>
  <ellipse cx="122" cy="102" rx="8" ry="4" fill="#f0a080" opacity=".45"/>
  <!-- gold bars left hand -->
  <g transform="translate(18,185)" filter="url(#sh)">
    <rect x="0" y="8" width="36" height="14" rx="2" fill="url(#gold)"/>
    <rect x="4" y="0" width="28" height="12" rx="2" fill="url(#gold)"/>
    <rect x="8" y="16" width="22" height="10" rx="2" fill="#e8a820"/>
  </g>
  <!-- gold bars right hand -->
  <g transform="translate(146,185)" filter="url(#sh)">
    <rect x="0" y="8" width="36" height="14" rx="2" fill="url(#gold)"/>
    <rect x="4" y="0" width="28" height="12" rx="2" fill="url(#gold)"/>
  </g>
  <!-- smile spark -->
  <circle cx="148" cy="70" r="4" fill="#ffe566" opacity=".9"/>
  <circle cx="52" cy="60" r="3" fill="#ffe566" opacity=".7"/>
</svg>
